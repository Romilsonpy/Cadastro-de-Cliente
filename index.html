<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#25D366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOP Agenda 2026">
    <title>TOP Agenda 2026 | Lembretes WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 1rem;
            transition: all 0.3s;
        }

        .install-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* TEMAS */
        body.theme-light {
            --primary-color: #2563eb;
            --whatsapp-color: #25D366;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --input-bg: #ffffff;
            --slot-bg: #f9fafb;
            --hover-bg: #f3f4f6;
        }
        
        body.theme-yellow {
            --primary-color: #d4af37;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
        }
        body.theme-yellow .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0a0a0a;
        }

        body.theme-blue {
            --primary-color: #2563eb;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
        }

        body.theme-red {
            --primary-color: #dc2626;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
        }

        body.theme-black {
            --primary-color: #1f1f1f;
            --bg-card: #1a1a1a;
            --bg-header: #0f0f0f;
            --text-primary: #e5e5e5;
            --text-secondary: #9ca3af;
            --border-color: #2a2a2a;
            --input-bg: #2a2a2a;
            --slot-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
        }
        body.theme-black .nav-btn.active {
            color: #d4af37;
            border-bottom-color: #d4af37;
        }
        body.theme-black .btn-primary {
            background: linear-gradient(135deg, #1f1f1f, #000000);
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        body {
            --primary-color: #2563eb;
            --whatsapp-color: #25D366;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --input-bg: #ffffff;
            --slot-bg: #f9fafb;
            --hover-bg: #f3f4f6;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        .glass-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .header {
            background: var(--bg-header);
            padding: 1rem 1.5rem;
            border-bottom: 3px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--primary-color);
        }

        .logo-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-area h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .logo-area p {
            color: var(--text-secondary);
            font-size: 0.7rem;
        }

        .nav-tabs {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-card);
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            color: var(--primary-color);
            background: rgba(37, 99, 235, 0.1);
        }

        .nav-btn.active {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }

        .tab-pane {
            display: none;
            padding: 1.2rem;
            animation: fadeIn 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.2rem;
        }

        .info-card {
            background: var(--slot-bg);
            border-radius: 1rem;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
        }

        .info-card h3 {
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.7rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark, #1d4ed8) 100%);
            color: white;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 0.7rem;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.3rem 0.7rem;
            border-radius: 0.6rem;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .btn-sm {
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
        }

        .client-item {
            background: var(--slot-bg);
            border-radius: 0.7rem;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border-color);
        }

        .msg-template {
            background: var(--slot-bg);
            border-radius: 0.7rem;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .msg-template:hover {
            background: var(--hover-bg);
            border-left: 3px solid #25D366;
        }

        .badge-whatsapp {
            background: rgba(37, 211, 102, 0.15);
            color: #25D366;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .footer {
            background: #f9fafb;
            padding: 0.7rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.65rem;
        }

        .year-badge {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .tab-pane { padding: 0.8rem; }
            .grid-2 { grid-template-columns: 1fr; }
            .nav-btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div id="root" class="app"></div>

<script>
    // ========== PWA INSTALL ==========
    let deferredPrompt = null;
    let isInstalled = localStorage.getItem("pwa_installed") === "true";

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => {
            if (!isInstalled && !document.getElementById('installFloatBtn')) {
                const btn = document.createElement('button');
                btn.id = 'installFloatBtn';
                btn.className = 'install-float';
                btn.innerHTML = '📲 Instalar TOP Agenda 2026 ⭐';
                document.body.appendChild(btn);
                btn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            isInstalled = true;
                            localStorage.setItem("pwa_installed", "true");
                        }
                        deferredPrompt = null;
                    } else {
                        alert("📱 Para instalar, clique no menu do navegador e selecione 'Instalar aplicativo'");
                    }
                    btn.remove();
                });
            }
        }, 2000);
    });

    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        isInstalled = true;
        localStorage.setItem("pwa_installed", "true");
    }

    // ========== CONFIGURAÇÕES ==========
    const STORAGE_KEY = "top_agenda_2026_system";

    const PLANOS = {
        TESTE: { nome: "Teste Grátis", dias: 7, preco: 0, chave: "TESTE7-TOP2026-FREE" },
        MENSAL: { nome: "Plano Mensal", dias: 30, preco: 29.90, chave: "MENSAL-TOP2026-2990" },
        TRIMESTRAL: { nome: "Plano Trimestral", dias: 90, preco: 79.90, chave: "TRIMESTRAL-TOP2026-7990" },
        ANUAL: { nome: "Plano Anual", dias: 365, preco: 249.90, chave: "ANUAL-TOP2026-24990" }
    };

    const CHAVES_MAP = {
        "TESTE7-TOP2026-FREE": "TESTE",
        "MENSAL-TOP2026-2990": "MENSAL",
        "TRIMESTRAL-TOP2026-7990": "TRIMESTRAL",
        "ANUAL-TOP2026-24990": "ANUAL"
    };

    let appData = {
        usuario: null,
        empresa: { nome: "TOP Agenda 2026", logoBase64: null },
        licenca: null,
        tema: "light",
        horarioInicio: "08:00",
        horarioFim: "20:00",
        horarioAlmocoInicio: "12:00",
        horarioAlmocoFim: "13:00",
        clientes: [],
        servicos: [],
        agendamentos: [],
        mensagensLembrete: []
    };

    function salvarDados() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function carregarDados() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                appData = { ...appData, ...parsed };
            } catch(e) {}
        }
        
        if (appData.servicos.length === 0) {
            appData.servicos = [
                { id: 1, nome: "Volume Brasileiro", duracao: 120, preco: 150, custo: 35 },
                { id: 2, nome: "Lash Lifting", duracao: 90, preco: 120, custo: 25 },
                { id: 3, nome: "Design de Sobrancelhas", duracao: 60, preco: 80, custo: 10 }
            ];
        }
        
        if (appData.clientes.length === 0) {
            appData.clientes = [
                { id: 1, nome: "Ana Oliveira", telefone: "11999990001", email: "ana@email.com", totalGasto: 0, totalVisitas: 0 },
                { id: 2, nome: "Beatriz Santos", telefone: "11999990002", email: "beatriz@email.com", totalGasto: 0, totalVisitas: 0 }
            ];
        }
        
        if (appData.mensagensLembrete.length === 0) {
            appData.mensagensLembrete = [
                "💛 Olá {nome}, tudo bem? Seus cílios já estão precisando de manutenção! Agende seu horário: {link}",
                "✨ Lembrete: Seu horário está reservado para {data} às {horario}. Confirme sua presença!",
                "🎁 Promoção especial para clientes fiéis! Agenda já seu próximo procedimento: {link}",
                "📅 {nome}, não se esqueça do seu agendamento amanhã às {horario}. Te espero!",
                "💆‍♀️ Oi {nome}, já faz 30 dias desde seu último atendimento. Hora de renovar seus cílios!"
            ];
        }
        
        if (!appData.tema) appData.tema = "light";
        salvarDados();
    }

    function aplicarTema(tema) {
        const body = document.body;
        body.classList.remove('theme-light', 'theme-yellow', 'theme-blue', 'theme-red', 'theme-black');
        switch(tema) {
            case 'yellow': body.classList.add('theme-yellow'); break;
            case 'blue': body.classList.add('theme-blue'); break;
            case 'red': body.classList.add('theme-red'); break;
            case 'black': body.classList.add('theme-black'); break;
            default: body.classList.add('theme-light');
        }
    }

    function validarLicenca() {
        if (!appData.licenca || !appData.licenca.ativo) return false;
        return new Date(appData.licenca.expiracao) > new Date();
    }

    function ativarPlanoPorChave(chave) {
        const planoId = CHAVES_MAP[chave.trim().toUpperCase()];
        if (planoId && PLANOS[planoId]) {
            const exp = new Date();
            exp.setDate(exp.getDate() + PLANOS[planoId].dias);
            appData.licenca = { chave: chave, plano: planoId, expiracao: exp.toISOString(), ativo: true };
            salvarDados();
            return { sucesso: true, plano: PLANOS[planoId].nome, expiracao: exp };
        }
        return { sucesso: false };
    }

    function ativarTesteGratis() {
        const exp = new Date();
        exp.setDate(exp.getDate() + 7);
        appData.licenca = { chave: "TESTE7-TOP2026-FREE", plano: "TESTE", expiracao: exp.toISOString(), ativo: true };
        salvarDados();
    }

    function getDiasRestantes() {
        if (!appData.licenca) return 0;
        const diff = Math.ceil((new Date(appData.licenca.expiracao) - new Date()) / (1000 * 60 * 60 * 24));
        return diff > 0 ? diff : 0;
    }

    function gerarLinkAgendamento() {
        return `${window.location.href.split('?')[0]}?agenda=${btoa(appData.empresa.nome)}`;
    }

    function enviarWhatsApp(telefone, mensagem) {
        if (!telefone) return;
        let numero = telefone.replace(/\D/g, '');
        if (!numero.startsWith('55')) numero = '55' + numero;
        window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
        });
    }

    function adicionarMensagemLembrete(mensagem) {
        appData.mensagensLembrete.push(mensagem);
        salvarDados();
    }

    function removerMensagemLembrete(index) {
        appData.mensagensLembrete.splice(index, 1);
        salvarDados();
    }

    function editarMensagemLembrete(index, novaMensagem) {
        appData.mensagensLembrete[index] = novaMensagem;
        salvarDados();
    }

    function calcularFinanceiro() {
        const totalReceita = (appData.agendamentos || []).reduce((s, a) => s + (a.valor || 0), 0);
        const totalCustos = (appData.agendamentos || []).reduce((s, a) => {
            const serv = appData.servicos.find(srv => srv.id === a.servicoId);
            return s + (serv?.custo || 0);
        }, 0);
        const porPagamento = { dinheiro: 0, pix: 0, credito: 0, debito: 0 };
        (appData.agendamentos || []).forEach(a => {
            const v = a.valor || 0;
            if (a.formaPagamento === 'dinheiro') porPagamento.dinheiro += v;
            else if (a.formaPagamento === 'pix') porPagamento.pix += v;
            else if (a.formaPagamento === 'credito') porPagamento.credito += v;
            else if (a.formaPagamento === 'debito') porPagamento.debito += v;
        });
        return { totalReceita, totalCustos, lucro: totalReceita - totalCustos, porPagamento };
    }

    function adicionarCliente(nome, telefone, email) {
        const novoId = Math.max(...appData.clientes.map(c => c.id), 0) + 1;
        appData.clientes.push({ id: novoId, nome, telefone, email: email || '', totalGasto: 0, totalVisitas: 0 });
        salvarDados();
    }

    function editarCliente(id, nome, telefone, email) {
        const index = appData.clientes.findIndex(c => c.id === id);
        if (index !== -1) {
            appData.clientes[index] = { ...appData.clientes[index], nome, telefone, email: email || '' };
            salvarDados();
        }
    }

    function removerCliente(id) {
        const temAgendamento = (appData.agendamentos || []).some(a => a.clienteId === id);
        if (temAgendamento) {
            alert("❌ Não é possível remover cliente com agendamentos!");
            return false;
        }
        appData.clientes = appData.clientes.filter(c => c.id !== id);
        salvarDados();
        return true;
    }

    function adicionarServico(nome, preco, custo, duracao) {
        const novoId = Math.max(...appData.servicos.map(s => s.id), 0) + 1;
        appData.servicos.push({ id: novoId, nome, preco: parseFloat(preco), custo: parseFloat(custo) || 0, duracao: parseInt(duracao) || 60 });
        salvarDados();
    }

    function editarServico(id, nome, preco, custo, duracao) {
        const index = appData.servicos.findIndex(s => s.id === id);
        if (index !== -1) {
            appData.servicos[index] = { ...appData.servicos[index], nome, preco: parseFloat(preco), custo: parseFloat(custo) || 0, duracao: parseInt(duracao) || 60 };
            salvarDados();
        }
    }

    function removerServico(id) {
        appData.servicos = appData.servicos.filter(s => s.id !== id);
        salvarDados();
    }

    function formatarTelefone(tel) {
        if (!tel) return '';
        const str = tel.toString();
        if (str.length === 11) return `(${str.substring(0,2)}) ${str.substring(2,7)}-${str.substring(7,11)}`;
        if (str.length === 10) return `(${str.substring(0,2)}) ${str.substring(2,6)}-${str.substring(6,10)}`;
        return str;
    }

    function renderizarApp() {
        if (!validarLicenca()) {
            document.getElementById("root").innerHTML = `
                <div class="glass-card" style="text-align: center; padding: 2rem; max-width: 500px; margin: 0 auto;">
                    <h2 style="color: var(--primary-color);">⭐ TOP Agenda 2026</h2>
                    <p>Seu período de teste de 7 dias expirou.</p>
                    <div class="info-card"><h3>Planos</h3><p>💰 Mensal: <code>MENSAL-TOP2026-2990</code> - R$29,90</p><p>📆 Trimestral: <code>TRIMESTRAL-TOP2026-7990</code> - R$79,90</p><p>🌟 Anual: <code>ANUAL-TOP2026-24990</code> - R$249,90</p><input type="text" id="chaveRenovacao" placeholder="Cole sua chave"><button id="btnRenovar" class="btn-primary" style="margin-top:1rem;">Ativar</button></div>
                </div>
            `;
            document.getElementById("btnRenovar")?.addEventListener("click", () => {
                const ativado = ativarPlanoPorChave(document.getElementById("chaveRenovacao").value);
                if (ativado.sucesso) { alert(`✅ ${ativado.plano} ativado!`); renderizarApp(); }
                else alert("❌ Chave inválida!");
            });
            return;
        }

        const diasRestantes = getDiasRestantes();
        const isTeste = appData.licenca?.plano === "TESTE";
        const financeiro = calcularFinanceiro();
        
        aplicarTema(appData.tema);
        
        const logoHtml = appData.empresa.logoBase64 ? `<img src="${appData.empresa.logoBase64}">` : `<span>⭐</span>`;
        
        const html = `
            <div class="glass-card">
                <div class="header">
                    <div class="logo-area">
                        <div class="logo-img">${logoHtml}</div>
                        <div>
                            <h1>⭐ TOP Agenda 2026 <span class="year-badge">NEW</span></h1>
                            <p>${appData.empresa.nome} · Lembretes WhatsApp</p>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div style="color:var(--primary-color);font-weight:500;">👤 ${appData.usuario?.nome}</div>
                        <div style="font-size:0.7rem;">${isTeste ? `🎁 ${diasRestantes} dias restantes` : `✅ Licença ativa`}</div>
                    </div>
                </div>
                
                <div class="nav-tabs">
                    <button class="nav-btn active" data-tab="agenda">📅 Agenda</button>
                    <button class="nav-btn" data-tab="lembretes">💬 Lembretes</button>
                    <button class="nav-btn" data-tab="clientes">👥 Clientes</button>
                    <button class="nav-btn" data-tab="servicos">💅 Serviços</button>
                    <button class="nav-btn" data-tab="financeiro">💰 Financeiro</button>

        function gerarOpcoesHorario() {
            let opts = '';
            let start = new Date(`2000-01-01T${appData.horarioInicio}:00`);
            const end = new Date(`2000-01-01T${appData.horarioFim}:00`);
            while (start < end) {
                const hora = start.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
                const isAlmoco = hora >= appData.horarioAlmocoInicio && hora < appData.horarioAlmocoFim;
                opts += `<option value="${hora}" ${isAlmoco ? 'disabled' : ''}>${hora} ${isAlmoco ? '(Almoço)' : ''}</option>`;
                start.setMinutes(start.getMinutes() + 30);
            }
            return opts;
        }
        
        function atualizarAgendaHoje() {
            const hoje = new Date().toISOString().slice(0,10);
            const container = document.getElementById("agendaHoje");
            if (!container) return;
            const agendamentosHoje = (appData.agendamentos || []).filter(a => a.data === hoje);
            if (agendamentosHoje.length === 0) {
                container.innerHTML = "<div style='text-align:center;padding:1rem;'>Nenhum agendamento hoje</div>";
                return;
            }
            container.innerHTML = agendamentosHoje.map(a => {
                const cliente = appData.clientes.find(c => c.id === a.clienteId);
                const servico = appData.servicos.find(s => s.id === a.servicoId);
                return `<div class="client-item">⏰ <strong>${a.horario}</strong><br><strong>${cliente?.nome}</strong><br>${servico?.nome} - R$ ${a.valor.toFixed(2)}</div>`;
            }).join('');
        }

            const container = document.getElementById("listaMensagens");
            if (!container) return;
            if (appData.mensagensLembrete.length === 0) {

        function atualizarListaClientes() {

            const container = document.getElementById("listaClientes");

            container.innerHTML = filtrados.map(c => `

                        <button class="btn-secondary btn-sm" onclick="enviarParaCliente(${c.id})">💬 Enviar Lembrete</button>

            `).join('');
            if (filtrados.length === 0) container.innerHTML = "<div style='text-align:center;padding:1rem;'>Nenhum cliente</div>";

        function atualizarListaServicos() {
            const container = document.getElementById("listaServicos");
            if (!container) return;
            container.innerHTML = appData.servicos.map(s => `
                <div class="client-item">
                    <div style="display:flex;justify-content:space-between;"><strong>${s.nome}</strong></div>

            if (appData.servicos.length === 0) container.innerHTML = "<div style='text-align:center;padding:1rem;'>Nenhum serviço</div>";

        function atualizarUltimosAtendimentos() {
            const container = document.getElementById("ultimosAtendimentos");
            if (!container) return;
            const ultimos = [...(appData.agendamentos || [])].reverse().slice(0,10);
            container.innerHTML = ultimos.map(a => {
                const c = appData.clientes.find(cl => cl.id === a.clienteId);
                return `<div class="client-item">📅 ${a.data} ${a.horario}<br><strong>${c?.nome}</strong> - R$ ${a.valor.toFixed(2)}</div>`;
            }).join('');
            if (ultimos.length === 0) container.innerHTML = "<div style='text-align:center;padding:1rem;'>Nenhum atendimento</div>";
        }
        
        function atualizarMelhoresClientes() {
            const container = document.getElementById("melhoresClientes");
            if (!container) return;
            const mapa = new Map();
            (appData.agendamentos || []).forEach(a => {
                const cliente = appData.clientes.find(c => c.id === a.clienteId);
                if (cliente) mapa.set(cliente.id, (mapa.get(cliente.id) || 0) + (a.valor || 0));
            });
            const top5 = Array.from(mapa.entries()).map(([id, total]) => ({ ...appData.clientes.find(c => c.id === id), total })).sort((a,b) => b.total - a.total).slice(0,5);
            container.innerHTML = top5.map((c,i) => `<div class="client-item" style="display:flex;justify-content:space-between;"><span>${i+1}º - ${c.nome}</span><span style="color:var(--primary-color);">R$ ${c.total.toFixed(2)}</span></div>`).join('');

        // Eventos
        document.getElementById("formAgendamento")?.addEventListener("submit", (e) => {
            e.preventDefault();

            if (clienteId === "novo") {
                const nome = prompt("Nome do cliente:");
                const telefone = prompt("Telefone:");
                if (nome && telefone) {
                    adicionarCliente(nome, telefone, "");
                    clienteId = appData.clientes[appData.clientes.length-1].id;
                } else return;
            }
            const data = document.getElementById("dataAgenda").value;
            const horario = document.getElementById("horarioAgenda").value;
            const servicoId = parseInt(document.getElementById("servicoId").value);
            const valor = parseFloat(document.getElementById("valorAgenda").value);
            const formaPagamento = document.getElementById("formaPagamento").value;
            
            if ((appData.agendamentos || []).find(a => a.data === data && a.horario === horario)) {
                alert("❌ Horário já ocupado!");
                return;
            }
            
            if (!appData.agendamentos) appData.agendamentos = [];
            appData.agendamentos.push({ id: Date.now(), clienteId: parseInt(clienteId), data, horario, servicoId, valor, formaPagamento });
            const cliente = appData.clientes.find(c => c.id === parseInt(clienteId));
            if (cliente) { cliente.totalGasto = (cliente.totalGasto || 0) + valor; cliente.totalVisitas = (cliente.totalVisitas || 0) + 1; }
            salvarDados();
            renderizarApp();
        });
        
        document.getElementById("btnNovaMensagem")?.addEventListener("click", () => {

            if (novaMensagem && novaMensagem.trim()) {
                adicionarMensagemLembrete(novaMensagem);
                renderizarApp();
            }
        });
        
        document.getElementById("btnEnviarLembrete")?.addEventListener("click", () => {
            let telefone = document.getElementById("telefoneLembrete").value;
            let mensagem = document.getElementById("mensagemLembrete").value;
            const selectCliente = document.getElementById("clienteLembrete");
            
            if (selectCliente && selectCliente.value) {
                const option = selectCliente.options[selectCliente.selectedIndex];
                telefone = option.getAttribute("data-tel") || telefone;
                mensagem = mensagem.replace(/{nome}/g, option.getAttribute("data-nome") || "");
            }
            
            mensagem = mensagem.replace(/{link}/g, gerarLinkAgendamento());
            mensagem = mensagem.replace(/{data}/g, new Date().toLocaleDateString());
            
            if (!telefone) {
                alert("📱 Selecione um cliente ou digite um telefone!");
                return;
            }
            if (!mensagem) {
                alert("📝 Digite uma mensagem ou selecione uma pronta!");
                return;
            }
            
            enviarWhatsApp(telefone, mensagem);
        });
        
        document.getElementById("btnLembretesHoje")?.addEventListener("click", () => {
            const hoje = new Date().toISOString().slice(0,10);
            const agendamentosHoje = (appData.agendamentos || []).filter(a => a.data === hoje);
            
            if (agendamentosHoje.length === 0) {
                alert("Nenhum agendamento para hoje!");
                return;
            }
            
            const mensagem = prompt("Digite a mensagem para enviar aos clientes de hoje:\n(Use {nome} para nome do cliente, {horario} para o horário, {link} para o link)", 
                "✨ {nome}, lembrete do seu horário hoje às {horario}. Te espero! {link}");
            
            if (!mensagem) return;
            
            agendamentosHoje.forEach(ag => {
                const cliente = appData.clientes.find(c => c.id === ag.clienteId);
                if (cliente && cliente.telefone) {
                    let msgEnvio = mensagem.replace(/{nome}/g, cliente.nome);
                    msgEnvio = msgEnvio.replace(/{horario}/g, ag.horario);
                    msgEnvio = msgEnvio.replace(/{link}/g, gerarLinkAgendamento());
                    msgEnvio = msgEnvio.replace(/{data}/g, hoje);
                    enviarWhatsApp(cliente.telefone, msgEnvio);
                }
            });
            alert(`✅ Enviando lembretes para ${agendamentosHoje.length} clientes...`);
        });

            const agendamentosAmanha = (appData.agendamentos || []).filter(a => a.data === amanhaStr);
            
            if (agendamentosAmanha.length === 0) {
                alert("Nenhum agendamento para amanhã!");
                return;
            }
            
            const mensagem = prompt("Digite a mensagem para enviar aos clientes de amanhã:\n(Use {nome} para nome do cliente, {horario} para o horário, {link} para o link)",
                "💛 {nome}, lembrete do seu horário amanhã às {horario}. Confirme sua presença! {link}");
            
            if (!mensagem) return;
            
            agendamentosAmanha.forEach(ag => {
                const cliente = appData.clientes.find(c => c.id === ag.clienteId);
                if (cliente && cliente.telefone) {
                    let msgEnvio = mensagem.replace(/{nome}/g, cliente.nome);
                    msgEnvio = msgEnvio.replace(/{horario}/g, ag.horario);
                    msgEnvio = msgEnvio.replace(/{link}/g, gerarLinkAgendamento());
                    msgEnvio = msgEnvio.replace(/{data}/g, amanhaStr);
                    enviarWhatsApp(cliente.telefone, msgEnvio);
                }
            });
            alert(`✅ Enviando lembretes para ${agendamentosAmanha.length} clientes...`);
        });
        
        document.getElementById("btnSalvarHorarios")?.addEventListener("click", () => {
            appData.horarioInicio = document.getElementById("cfgInicio").value;
            appData.horarioFim = document.getElementById("cfgFim").value;
            appData.horarioAlmocoInicio = document.getElementById("cfgAlmocoIni").value;
            appData.horarioAlmocoFim = document.getElementById("cfgAlmocoFim").value;
            salvarDados();
            renderizarApp();
        });
        
        document.getElementById("btnCopiarLink")?.addEventListener("click", () => {
            const link = document.getElementById("linkAgendamento");
            link.select();
            document.execCommand("copy");
            alert("✅ Link copiado!");
        });
        
        document.getElementById("btnSalvarStudio")?.addEventListener("click", () => {
            appData.empresa.nome = document.getElementById("nomeStudio").value;
            salvarDados();
            renderizarApp();
        });
        
        document.getElementById("btnUpgrade")?.addEventListener("click", () => {
            const ativado = ativarPlanoPorChave(document.getElementById("chaveUpgrade").value);
            if (ativado.sucesso) { alert(`✅ ${ativado.plano} ativado!`); renderizarApp(); }
            else alert("❌ Chave inválida!");
        });
        
        document.getElementById("filtroClientes")?.addEventListener("input", () => atualizarListaClientes());
        document.getElementById("servicoId")?.addEventListener("change", (e) => {
            const preco = e.target.options[e.target.selectedIndex]?.getAttribute("data-preco");
            if (preco && document.getElementById("valorAgenda")) document.getElementById("valorAgenda").value = preco;
        });
        
        // Troca de abas
        document.querySelectorAll(".nav-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const tab = btn.getAttribute("data-tab");
                document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
                document.getElementById(`tab-${tab}`).classList.add("active");
                document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                if (tab === "clientes") atualizarListaClientes();
                if (tab === "servicos") atualizarListaServicos();
                if (tab === "financeiro") atualizarUltimosAtendimentos();
                if (tab === "lembretes") atualizarListaMensagens();
            });
        });
        
        atualizarAgendaHoje();
        atualizarListaClientes();
        atualizarListaServicos();
        atualizarListaMensagens();
        atualizarUltimosAtendimentos();
        atualizarMelhoresClientes();
        
        const selectLembrete = document.getElementById("clienteLembrete");
        if (selectLembrete) {
            selectLembrete.innerHTML = `<option value="">Selecione um cliente...</option>` + appData.clientes.map(c => `<option value="${c.id}" data-tel="${c.telefone}" data-nome="${c.nome}">${c.nome} - ${formatarTelefone(c.telefone)}</option>`).join('');
        }
    }
    
    // Telas de acesso
    function showPrimeiroAcesso() {
        document.getElementById("root").innerHTML = `
            <div class="glass-card" style="max-width:500px;margin:2rem auto;text-align:center;padding:2rem;">
                <h2 style="color:var(--primary-color);">⭐ TOP Agenda 2026</h2>
                <div class="info-card" style="margin:1rem 0;"><h3>🎁 Teste Grátis de 7 dias</h3><p style="font-size:0.8rem;">Envie lembretes automáticos pelo WhatsApp!</p></div>
                <div class="form-group"><label>Usuário</label><input type="text" id="newUser"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="newPass"></div>
                <div class="form-group"><label>Confirmar</label><input type="password" id="confirmPass"></div>
                <div class="form-group"><label>Nome do Estúdio</label><input type="text" id="studioName" value="Meu Estúdio"></div>
                <div class="form-group"><label>Chave (opcional)</label><input type="text" id="licenseKey" placeholder="TESTE7-TOP2026-FREE"></div>
                <button id="btnIniciar" class="btn-primary">🚀 Iniciar Teste</button>
            </div>
        `;
        document.getElementById("btnIniciar").addEventListener("click", () => {
            const user = document.getElementById("newUser").value.trim();
            const pass = document.getElementById("newPass").value;
            const confirm = document.getElementById("confirmPass").value;
            const studio = document.getElementById("studioName").value.trim() || "Meu Estúdio";
            const chave = document.getElementById("licenseKey").value.trim().toUpperCase();
            if (!user || !pass) return alert("Preencha todos os campos");
            if (pass !== confirm) return alert("Senhas não conferem");
            appData.usuario = { nome: user, senha: pass };
            appData.empresa = { nome: studio, logoBase64: null };
            appData.agendamentos = [];
            if (chave) { if (!ativarPlanoPorChave(chave).sucesso) ativarTesteGratis(); }
            else ativarTesteGratis();
            appData.tema = "light";
            salvarDados();
            renderizarApp();
        });
    }
    
    function showLogin() {
        document.getElementById("root").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:3rem auto;text-align:center;padding:2rem;">
                <h2 style="color:var(--primary-color);">⭐ TOP Agenda 2026</h2>
                <div class="form-group"><label>Usuário</label><input type="text" id="loginUser"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="loginPass"></div>
                <button id="btnEntrar" class="btn-primary">Entrar</button>
            </div>
        `;
        document.getElementById("btnEntrar").addEventListener("click", () => {
            const user = document.getElementById("loginUser").value.trim();
            const pass = document.getElementById("loginPass").value;
            if (appData.usuario && user === appData.usuario.nome && pass === appData.usuario.senha) renderizarApp();
            else alert("Usuário ou senha incorretos");
        });
    }
    
    function init() { 
        carregarDados(); 
        if (!appData.usuario) showPrimeiroAcesso(); 
        else showLogin();
    }
    
    init();
</script>
</body>
</html>
