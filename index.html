<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#25D366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOP Agenda 2026">
    <title>TOP Agenda 2026 | Calendário de Horários</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.3s ease;
        }

        body.bg-solid {
            background: #f0f2f5;
        }

        body.bg-image {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .install-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* TEMAS */
        body.theme-light {
            --primary-color: #2563eb;
            --whatsapp-color: #25D366;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --input-bg: #ffffff;
            --slot-bg: #f9fafb;
            --hover-bg: #f3f4f6;
            --calendario-cor-livre: #22c55e;
            --calendario-cor-ocupado: #ef4444;
        }
        
        body.theme-yellow {
            --primary-color: #d4af37;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --calendario-cor-livre: #22c55e;
            --calendario-cor-ocupado: #ef4444;
        }
        body.theme-yellow .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0a0a0a;
        }

        body.theme-blue {
            --primary-color: #2563eb;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
        }

        body.theme-red {
            --primary-color: #dc2626;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
        }

        body.theme-black {
            --primary-color: #1f1f1f;
            --bg-card: #1a1a1a;
            --bg-header: #0f0f0f;
            --text-primary: #e5e5e5;
            --text-secondary: #9ca3af;
            --border-color: #2a2a2a;
            --input-bg: #2a2a2a;
            --slot-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
            --calendario-cor-livre: #22c55e;
            --calendario-cor-ocupado: #ef4444;
        }
        body.theme-black .nav-btn.active {
            color: #d4af37;
            border-bottom-color: #d4af37;
        }
        body.theme-black .btn-primary {
            background: linear-gradient(135deg, #1f1f1f, #000000);
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        body {
            --primary-color: #2563eb;
            --whatsapp-color: #25D366;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --input-bg: #ffffff;
            --slot-bg: #f9fafb;
            --hover-bg: #f3f4f6;
            --calendario-cor-livre: #22c55e;
            --calendario-cor-ocupado: #ef4444;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        .glass-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }

        .header {
            background: var(--bg-header);
            padding: 1rem 1.5rem;
            border-bottom: 3px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--primary-color);
        }

        .logo-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-area h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .logo-area p {
            color: var(--text-secondary);
            font-size: 0.7rem;
        }

        .nav-tabs {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-card);
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            color: var(--primary-color);
            background: rgba(37, 99, 235, 0.1);
        }

        .nav-btn.active {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }

        .tab-pane {
            display: none;
            padding: 1.2rem;
            animation: fadeIn 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.2rem;
        }

        .info-card {
            background: var(--slot-bg);
            border-radius: 1rem;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
        }

        .info-card h3 {
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* CALENDÁRIO */
        .calendario-container {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
        }

        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .calendario-mes {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .calendario-nav button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: var(--text-primary);
            margin: 0 0.2rem;
        }

        .calendario-nav button:hover {
            background: var(--primary-color);
            color: white;
        }

        .calendario-dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .calendario-dias {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.3rem;
        }

        .calendario-dia {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            background: var(--slot-bg);
            border: 1px solid var(--border-color);
        }

        .calendario-dia:hover {
            transform: scale(1.05);
            background: var(--hover-bg);
        }

        .calendario-dia.tem-agendamento {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #dc2626;
        }

        .calendario-dia.selecionado {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .calendario-dia.outro-mes {
            opacity: 0.4;
        }

        /* Horários do dia selecionado */
        .horarios-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 0.5rem;
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .horario-slot {
            padding: 0.5rem;
            text-align: center;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .horario-slot.livre {
            background: #22c55e20;
            border: 2px solid #22c55e;
            color: #16a34a;
        }

        .horario-slot.livre:hover {
            background: #22c55e;
            color: white;
        }

        .horario-slot.ocupado {
            background: #ef444420;
            border: 2px solid #ef4444;
            color: #dc2626;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .horario-slot.ocupado span {
            font-size: 0.7rem;
            display: block;
            color: var(--text-secondary);
        }

        .legenda {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.7rem;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .legenda-cor {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .legenda-cor.livre {
            background: #22c55e;
        }
        .legenda-cor.ocupado {
            background: #ef4444;
        }
        .legenda-cor.selecionado {
            background: var(--primary-color);
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.7rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark, #1d4ed8) 100%);
            color: white;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 0.7rem;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.3rem 0.7rem;
            border-radius: 0.6rem;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .btn-sm {
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
        }

        .client-item {
            background: var(--slot-bg);
            border-radius: 0.7rem;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border-color);
        }

        .msg-template {
            background: var(--slot-bg);
            border-radius: 0.7rem;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .msg-template:hover {
            background: var(--hover-bg);
            border-left: 3px solid #25D366;
        }

        .badge-whatsapp {
            background: rgba(37, 211, 102, 0.15);
            color: #25D366;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .footer {
            background: #f9fafb;
            padding: 0.7rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.65rem;
        }

        .year-badge {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        .color-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-circle:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .tab-pane { padding: 0.8rem; }
            .grid-2 { grid-template-columns: 1fr; }
            .nav-btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; }
            .horarios-container { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
        }
    </style>
</head>
<body>
<div id="root" class="app"></div>

<script>
    // ========== PWA INSTALL ==========
    let deferredPrompt = null;
    let isInstalled = localStorage.getItem("pwa_installed") === "true";

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => {
            if (!isInstalled && !document.getElementById('installFloatBtn')) {
                const btn = document.createElement('button');
                btn.id = 'installFloatBtn';
                btn.className = 'install-float';
                btn.innerHTML = '📲 Instalar TOP Agenda 2026 ⭐';
                document.body.appendChild(btn);
                btn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            isInstalled = true;
                            localStorage.setItem("pwa_installed", "true");
                        }
                        deferredPrompt = null;
                    } else {
                        alert("📱 Para instalar, clique no menu do navegador e selecione 'Instalar aplicativo'");
                    }
                    btn.remove();
                });
            }
        }, 2000);
    });

    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        isInstalled = true;
        localStorage.setItem("pwa_installed", "true");
    }

    // ========== CONFIGURAÇÕES ==========
    const STORAGE_KEY = "top_agenda_2026_system";

    const PLANOS = {
        TESTE: { nome: "Teste Grátis", dias: 7, preco: 0, chave: "TESTE7-TOP2026-FREE" },
        MENSAL: { nome: "Plano Mensal", dias: 30, preco: 29.90, chave: "MENSAL-TOP2026-2990" },
        TRIMESTRAL: { nome: "Plano Trimestral", dias: 90, preco: 79.90, chave: "TRIMESTRAL-TOP2026-7990" },
        ANUAL: { nome: "Plano Anual", dias: 365, preco: 249.90, chave: "ANUAL-TOP2026-24990" }
    };

    const CHAVES_MAP = {
        "TESTE7-TOP2026-FREE": "TESTE",
        "MENSAL-TOP2026-2990": "MENSAL",
        "TRIMESTRAL-TOP2026-7990": "TRIMESTRAL",
        "ANUAL-TOP2026-24990": "ANUAL"
    };

    let appData = {
        usuario: null,
        empresa: { nome: "TOP Agenda 2026", logoBase64: null },
        licenca: null,
        tema: "light",
        fundo: { tipo: "solid", cor: "#f0f2f5", imagem: null },
        horarioInicio: "08:00",
        horarioFim: "20:00",
        horarioAlmocoInicio: "12:00",
        horarioAlmocoFim: "13:00",
        clientes: [],
        servicos: [],
        agendamentos: [],
        mensagensLembrete: []
    };

    // Variáveis do calendário
    let calendarioData = new Date();
    let dataSelecionada = new Date().toISOString().slice(0, 10);

    function salvarDados() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function carregarDados() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                appData = { ...appData, ...parsed };
            } catch(e) {}
        }
        
        if (appData.servicos.length === 0) {
            appData.servicos = [
                { id: 1, nome: "Volume Brasileiro", duracao: 120, preco: 150, custo: 35 },
                { id: 2, nome: "Lash Lifting", duracao: 90, preco: 120, custo: 25 },
                { id: 3, nome: "Design de Sobrancelhas", duracao: 60, preco: 80, custo: 10 }
            ];
        }
        
        if (appData.clientes.length === 0) {
            appData.clientes = [
                { id: 1, nome: "Ana Oliveira", telefone: "11999990001", email: "ana@email.com", totalGasto: 0, totalVisitas: 0 },
                { id: 2, nome: "Beatriz Santos", telefone: "11999990002", email: "beatriz@email.com", totalGasto: 0, totalVisitas: 0 }
            ];
        }
        
        if (appData.mensagensLembrete.length === 0) {
            appData.mensagensLembrete = [
                "💛 Olá {nome}, tudo bem? Seus cílios já estão precisando de manutenção! Agende seu horário: {link}",
                "✨ Lembrete: Seu horário está reservado para {data} às {horario}. Confirme sua presença!",
                "🎁 Promoção especial para clientes fiéis! Agenda já seu próximo procedimento: {link}"
            ];
        }
        
        if (!appData.tema) appData.tema = "light";
        if (!appData.fundo) {
            appData.fundo = { tipo: "solid", cor: "#f0f2f5", imagem: null };
        }
        if (!appData.agendamentos) appData.agendamentos = [];
        salvarDados();
    }

    function aplicarTema(tema) {
        const body = document.body;
        body.classList.remove('theme-light', 'theme-yellow', 'theme-blue', 'theme-red', 'theme-black');
        switch(tema) {
            case 'yellow': body.classList.add('theme-yellow'); break;
            case 'blue': body.classList.add('theme-blue'); break;
            case 'red': body.classList.add('theme-red'); break;
            case 'black': body.classList.add('theme-black'); break;
            default: body.classList.add('theme-light');
        }
    }

    function aplicarFundo() {
        const body = document.body;
        if (appData.fundo.tipo === "solid") {
            body.classList.remove('bg-image');
            body.classList.add('bg-solid');
            body.style.background = appData.fundo.cor || "#f0f2f5";
            body.style.backgroundImage = "none";
        } else if (appData.fundo.tipo === "image" && appData.fundo.imagem) {
            body.classList.remove('bg-solid');
            body.classList.add('bg-image');
            body.style.backgroundImage = `url(${appData.fundo.imagem})`;
            body.style.backgroundSize = "cover";
            body.style.backgroundPosition = "center";
            body.style.backgroundRepeat = "no-repeat";
            body.style.backgroundAttachment = "fixed";
        }
    }

    function validarLicenca() {
        if (!appData.licenca || !appData.licenca.ativo) return false;
        return new Date(appData.licenca.expiracao) > new Date();
    }

    function ativarPlanoPorChave(chave) {
        const planoId = CHAVES_MAP[chave.trim().toUpperCase()];
        if (planoId && PLANOS[planoId]) {
            const exp = new Date();
            exp.setDate(exp.getDate() + PLANOS[planoId].dias);
            appData.licenca = { chave: chave, plano: planoId, expiracao: exp.toISOString(), ativo: true };
            salvarDados();
            return { sucesso: true, plano: PLANOS[planoId].nome, expiracao: exp };
        }
        return { sucesso: false };
    }

    function ativarTesteGratis() {
        const exp = new Date();
        exp.setDate(exp.getDate() + 7);
        appData.licenca = { chave: "TESTE7-TOP2026-FREE", plano: "TESTE", expiracao: exp.toISOString(), ativo: true };
        salvarDados();
    }

    function getDiasRestantes() {
        if (!appData.licenca) return 0;
        const diff = Math.ceil((new Date(appData.licenca.expiracao) - new Date()) / (1000 * 60 * 60 * 24));
        return diff > 0 ? diff : 0;
    }

    function gerarLinkAgendamento() {
        return `${window.location.href.split('?')[0]}?agenda=${btoa(appData.empresa.nome)}`;
    }

    function enviarWhatsApp(telefone, mensagem) {
        if (!telefone) return;
        let numero = telefone.replace(/\D/g, '');
        if (!numero.startsWith('55')) numero = '55' + numero;
        window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
        });
    }

    // Funções para verificar horários ocupados
    function getHorariosOcupados(data) {
        const agendamentosHoje = (appData.agendamentos || []).filter(a => a.data === data);
        return agendamentosHoje.map(a => a.horario);
    }

    function isHorarioOcupado(data, horario) {
        return (appData.agendamentos || []).some(a => a.data === data && a.horario === horario);
    }

    function getAgendamentoPorHorario(data, horario) {
        return (appData.agendamentos || []).find(a => a.data === data && a.horario === horario);
    }

    function gerarListaHorarios() {
        const horarios = [];
        let start = new Date(`2000-01-01T${appData.horarioInicio}:00`);
        const end = new Date(`2000-01-01T${appData.horarioFim}:00`);
        while (start < end) {
            const hora = start.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
            const isAlmoco = hora >= appData.horarioAlmocoInicio && hora < appData.horarioAlmocoFim;
            if (!isAlmoco) {
                horarios.push(hora);
            }
            start.setMinutes(start.getMinutes() + 30);
        }
        return horarios;
    }

    function adicionarMensagemLembrete(mensagem) {
        appData.mensagensLembrete.push(mensagem);
        salvarDados();
    }

    function removerMensagemLembrete(index) {
        appData.mensagensLembrete.splice(index, 1);
        salvarDados();
    }

    function editarMensagemLembrete(index, novaMensagem) {
        appData.mensagensLembrete[index] = novaMensagem;
        salvarDados();
    }

    function calcularFinanceiro() {
        const totalReceita = (appData.agendamentos || []).reduce((s, a) => s + (a.valor || 0), 0);
        const totalCustos = (appData.agendamentos || []).reduce((s, a) => {
            const serv = appData.servicos.find(srv => srv.id === a.servicoId);
            return s + (serv?.custo || 0);
        }, 0);
        const porPagamento = { dinheiro: 0, pix: 0, credito: 0, debito: 0 };
        (appData.agendamentos || []).forEach(a => {
            const v = a.valor || 0;
            if (a.formaPagamento === 'dinheiro') porPagamento.dinheiro += v;
            else if (a.formaPagamento === 'pix') porPagamento.pix += v;
            else if (a.formaPagamento === 'credito') porPagamento.credito += v;
            else if (a.formaPagamento === 'debito') porPagamento.debito += v;
        });
        return { totalReceita, totalCustos, lucro: totalReceita - totalCustos, porPagamento };
    }

    function formatarTelefone(tel) {
        if (!tel) return '';
        const str = tel.toString();
        if (str.length === 11) return `(${str.substring(0,2)}) ${str.substring(2,7)}-${str.substring(7,11)}`;
        if (str.length === 10) return `(${str.substring(0,2)}) ${str.substring(2,6)}-${str.substring(6,10)}`;
        return str;
    }

    function renderizarCalendario() {
        const container = document.getElementById("calendarioGrid");
        const mesAno = document.getElementById("calendarioMesAno");
        if (!container) return;
        
        const ano = calendarioData.getFullYear();
        const mes = calendarioData.getMonth();
        
        const primeiroDia = new Date(ano, mes, 1);
        const ultimoDia = new Date(ano, mes + 1, 0);
        const diasNoMes = ultimoDia.getDate();
        const diaInicioSemana = primeiroDia.getDay();
        
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        mesAno.innerHTML = `${meses[mes]} ${ano}`;
        
        let dias = [];
        const diasMesAnterior = new Date(ano, mes, 0).getDate();
        
        for (let i = diaInicioSemana - 1; i >= 0; i--) {
            const dia = diasMesAnterior - i;
            dias.push({ dia, mesAtual: false, data: `${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}` });
        }
        
        for (let i = 1; i <= diasNoMes; i++) {
            const data = `${ano}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const temAgendamento = (appData.agendamentos || []).some(a => a.data === data);
            dias.push({ dia: i, mesAtual: true, data, temAgendamento });
        }
        
        const diasRestantes = 42 - dias.length;
        for (let i = 1; i <= diasRestantes; i++) {
            const data = `${ano}-${String(mes+2).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            dias.push({ dia: i, mesAtual: false, data });
        }
        
        container.innerHTML = dias.map(d => `
            <div class="calendario-dia ${!d.mesAtual ? 'outro-mes' : ''} ${d.temAgendamento ? 'tem-agendamento' : ''} ${dataSelecionada === d.data ? 'selecionado' : ''}"
                 onclick="selecionarData('${d.data}')">
                ${d.dia}
            </div>
        `).join('');
        
        // Atualizar horários da data selecionada
        atualizarHorariosDaData();
    }
    
    function atualizarHorariosDaData() {
        const container = document.getElementById("horariosDataSelecionada");
        if (!container) return;
        
        const ocupados = getHorariosOcupados(dataSelecionada);
        const todosHorarios = gerarListaHorarios();
        
        if (todosHorarios.length === 0) {
            container.innerHTML = "<div style='text-align:center;padding:1rem;'>Nenhum horário disponível para esta data</div>";
            return;
        }
        
        container.innerHTML = todosHorarios.map(horario => {
            const ocupado = ocupados.includes(horario);
            const agendamento = ocupado ? getAgendamentoPorHorario(dataSelecionada, horario) : null;
            const cliente = agendamento ? appData.clientes.find(c => c.id === agendamento.clienteId) : null;
            const servico = agendamento ? appData.servicos.find(s => s.id === agendamento.servicoId) : null;
            
            if (ocupado) {
                return `<div class="horario-slot ocupado" onclick="selecionarHorarioOcupado('${horario}', '${cliente?.nome || ''}', '${servico?.nome || ''}')">
                            ${horario} 🔴 OCUPADO
                            <span>${cliente?.nome || ''}</span>
                        </div>`;
            } else {
                return `<div class="horario-slot livre" onclick="selecionarHorarioLivre('${horario}')">
                            ${horario} 🟢 LIVRE
                        </div>`;
            }
        }).join('');
        
        document.getElementById("dataSelecionadaTexto").innerHTML = `📅 ${new Date(dataSelecionada).toLocaleDateString('pt-BR')}`;
    }
    
    function selecionarData(data) {
        dataSelecionada = data;
        renderizarCalendario();
    }

        document.getElementById("dataAgenda").value = dataSelecionada;

        function gerarOpcoesHorario() {
            let opts = '';
            let start = new Date(`2000-01-01T${appData.horarioInicio}:00`);
            const end = new Date(`2000-01-01T${appData.horarioFim}:00`);
            while (start < end) {
                const hora = start.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
                const isAlmoco = hora >= appData.horarioAlmocoInicio && hora < appData.horarioAlmocoFim;
                opts += `<option value="${hora}" ${isAlmoco ? 'disabled' : ''}>${hora} ${isAlmoco ? '(Almoço)' : ''}</option>`;
                start.setMinutes(start.getMinutes() + 30);
            }
            return opts;
        }

        document.getElementById("root").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:3rem auto;text-align:center;padding:2rem;">
                <h2 style="color:var(--primary-color);">⭐ TOP Agenda 2026</h2>
                <div class="form-group"><label>Usuário</label><input type="text" id="loginUser"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="loginPass"></div>
                <button id="btnEntrar" class="btn-primary">Entrar</button>
            </div>
        `;
        document.getElementById("btnEntrar").addEventListener("click", () => {
            const user = document.getElementById("loginUser").value.trim();
            const pass = document.getElementById("loginPass").value;
            if (appData.usuario && user === appData.usuario.nome && pass === appData.usuario.senha) renderizarApp();
            else alert("Usuário ou senha incorretos");
        });
    }
    
    function init() { 
        carregarDados(); 
        if (!appData.usuario) showPrimeiroAcesso(); 
        else showLogin();
    }
    
    init();
</script>
</body>
</html>
