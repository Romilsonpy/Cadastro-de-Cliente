<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Agenda Lash Designer | Sistema Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Cores profissionais */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #0ea5e9;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-elevated: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-accent: #38bdf8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(37, 99, 235, 0.2);
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 2rem;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2rem;
            color: white;
            font-weight: 700;
        }

        .auth-header h1 span {
            background: rgba(255,255,255,0.2);
            padding: 0 0.5rem;
            border-radius: 40px;
            display: inline-block;
        }

        .auth-header p {
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .auth-form {
            padding: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1.5px solid var(--border);
            border-radius: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-accent);
            box-shadow: none;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            border-left: 3px solid var(--danger);
            font-size: 0.9rem;
            display: none;
        }

        .info-msg {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .warning-msg {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .main-container {
            max-width: 1400px;
            width: 100%;
            background: var(--bg-dark);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(37, 99, 235, 0.2);
            overflow: hidden;
            display: none;
        }

        .hero {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 1.5rem 2rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-display {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .hero h1 {
            font-size: 1.5rem;
            color: white;
            font-weight: 700;
        }

        .company-badge {
            background: rgba(255,255,255,0.15);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
        }

        .warning-banner {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            text-align: center;
            padding: 0.6rem;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .profile-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 0.6rem 2rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-accent);
        }

        .btn-profile, .btn-logout {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-profile:hover, .btn-logout:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tabs {
            display: flex;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 1rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 1rem 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .tab-btn:hover {
            color: var(--text-accent);
        }

        .tab-btn.active {
            color: var(--primary-light);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .tab-content {
            display: none;
            padding: 2rem;
            background: var(--bg-dark);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .form-section, .list-section, .finance-section {
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .form-section { flex: 1.2; min-width: 280px; }
        .list-section { flex: 2; min-width: 320px; }
        .finance-section { flex: 1; min-width: 260px; }

        h2 {
            color: var(--text-primary);
            font-size: 1.3rem;
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-dark);
            border: 1.5px solid var(--border);
            border-radius: 0.8rem;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .total-faturamento {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 1.2rem;
            border-radius: 1rem;
            text-align: center;
            margin-top: 1rem;
        }

        .total-faturamento h3 {
            color: white;
            font-size: 2rem;
        }

        .total-faturamento p {
            color: rgba(255,255,255,0.8);
        }

        .card {
            background: var(--bg-dark);
            border-radius: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            border-left: 4px solid var(--primary);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateX(5px);
            background: var(--bg-elevated);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .nome-cliente {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .btn-remover {
            background: rgba(239, 68, 68, 0.15);
            border: none;
            color: #f87171;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
        }

        .btn-remover:hover {
            background: var(--danger);
            color: white;
        }

        .badge-count {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .filtro {
            margin-bottom: 1rem;
        }

        .preview-logo {
            margin-top: 1rem;
            text-align: center;
        }

        .preview-logo img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .license-card {
            background: var(--bg-dark);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
        }

        .license-card h4 {
            color: var(--text-accent);
            margin-bottom: 0.5rem;
        }

        .activate-section {
            background: var(--bg-dark);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
        }

        .activate-input {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .activate-input input {
            flex: 2;
            min-width: 180px;
        }

        .activate-input button {
            flex: 1;
            min-width: 100px;
            margin-top: 0;
        }

        footer {
            background: var(--bg-card);
            padding: 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 780px) {
            body { padding: 1rem; }
            .tab-btn { padding: 0.8rem 1.2rem; font-size: 0.85rem; }
            .tab-content { padding: 1rem; }
            .activate-input { flex-direction: column; }
            .activate-input button { margin-top: 0.5rem; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ========== AGENDA LASH DESIGNER - SISTEMA PROFISSIONAL ==========
    const STORAGE_KEY = "agenda_lash_designer_data";
    
    // CHAVES DE ATIVAÇÃO (APENAS PARA PLANOS PAGOS)
    // TESTE GRÁTIS DE 7 DIAS É AUTOMÁTICO - NÃO PRECISA DE CHAVE!
    const CHAVES_ATIVACAO = {
        "MENSAL-EMILY2024-BRL25": { 
            plano: "MENSAL", 
            nome: "Plano Mensal", 
            dias: 30, 
            preco: 25.00,
            descricao: "💰 Plano Mensal - R$ 25,00 (30 dias)"
        },
        "SEMESTRAL-EMILY2024-BRL80": { 
            plano: "SEMESTRAL", 
            nome: "Plano Semestral", 
            dias: 180, 
            preco: 80.00,
            descricao: "📆 Plano Semestral - R$ 80,00 (180 dias)"
        },
        "ANUAL-EMILY2024-BRL130": { 
            plano: "ANUAL", 
            nome: "Plano Anual", 
            dias: 365, 
            preco: 130.00,
            descricao: "🌟 Plano Anual - R$ 130,00 (365 dias)"
        }
    };

    const PLANOS_INFO = {
        TESTE: { nome: "Teste Grátis", dias: 7, preco: 0 },
        MENSAL: { nome: "Plano Mensal", dias: 30, preco: 25.00 },
        SEMESTRAL: { nome: "Plano Semestral", dias: 180, preco: 80.00 },
        ANUAL: { nome: "Plano Anual", dias: 365, preco: 130.00 }
    };

    function validarEAtivarChave(chave) {
        if (!chave) return { sucesso: false, mensagem: "Digite uma chave de ativação." };
        
        const chaveUpper = chave.trim().toUpperCase();
        const planoInfo = CHAVES_ATIVACAO[chaveUpper];
        
        if (planoInfo) {
            const expiracao = new Date();
            expiracao.setDate(expiracao.getDate() + planoInfo.dias);
            return { 
                sucesso: true, 
                plano: planoInfo.plano,
                nome: planoInfo.nome,
                descricao: planoInfo.descricao,
                dias: planoInfo.dias,
                preco: planoInfo.preco,
                expiracao: expiracao
            };
        }
        
        return { sucesso: false, mensagem: "❌ Chave inválida! Verifique e tente novamente." };
    }

    let appData = {
        empresa: null,
        usuario: null,
        licenca: null,
        agendamentos: [],
        valorServicoPadrao: 120.00,
        configuracoes: { logo: "💎", logoBase64: null, nomeStudio: "Agenda Lash Designer" }
    };

    function salvarDados() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function carregarDados() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                appData = { ...appData, ...parsed };
            } catch(e) {}
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
        });
    }

    function alterarSenha(novaSenha) {
        if(appData.usuario) {
            appData.usuario.senha = novaSenha;
            salvarDados();
            return true;
        }
        return false;
    }

    function calcularFaturamentoMensal() {
        const hoje = new Date();
        const mesAtual = hoje.getMonth();
        const anoAtual = hoje.getFullYear();
        let total = 0;
        appData.agendamentos.forEach(ag => {
            const dataAg = new Date(ag.data);
            if(dataAg.getMonth() === mesAtual && dataAg.getFullYear() === anoAtual) {
                total += (ag.valor || appData.valorServicoPadrao);
            }
        });
        return total;
    }

    function getDiasRestantes() {
        if(!appData.licenca) return 0;
        const diff = Math.ceil((new Date(appData.licenca.expiracao) - new Date()) / (1000 * 60 * 60 * 24));
        return diff > 0 ? diff : 0;
    }

    function validarLicenca() {
        if (!appData.licenca || !appData.licenca.ativo) return false;
        return new Date(appData.licenca.expiracao) > new Date();
    }

    function ativarLicenca(chave) {
        const resultado = validarEAtivarChave(chave);
        if(resultado.sucesso) {
            appData.licenca = { 
                chave: chave.toUpperCase(), 
                plano: resultado.plano, 
                expiracao: resultado.expiracao.toISOString(), 
                ativo: true 
            };
            salvarDados();
        }
        return resultado;
    }

    function ativarTesteGratis() {
        const expiracao = new Date();
        expiracao.setDate(expiracao.getDate() + 7);
        appData.licenca = { 
            chave: "TESTE_AUTOMATICO", 
            plano: "TESTE", 
            expiracao: expiracao.toISOString(), 
            ativo: true 
        };
        salvarDados();
    }

    function showCadastro() {
        const html = `
            <div class="auth-container">
                <div class="auth-header">
                    <h1>💎 Agenda <span>Lash Designer</span></h1>
                    <p>Cadastro • Primeiro Acesso</p>
                </div>
                <div class="auth-form">
                    <div class="info-msg">
                        ✨ Bem-vindo ao Agenda Lash Designer! ✨<br>
                        <strong>🎁 Teste grátis de 7 dias ativado automaticamente!</strong>
                    </div>
                    <div id="cadastroError" class="error-msg"></div>
                    <div class="input-group">
                        <label>👤 Nome do Usuário</label>
                        <input type="text" id="newUsername" placeholder="Ex: Emily Designer">
                    </div>
                    <div class="input-group">
                        <label>🔒 Senha</label>
                        <input type="password" id="newPassword" placeholder="Crie uma senha">
                    </div>
                    <div class="input-group">
                        <label>🔒 Confirmar Senha</label>
                        <input type="password" id="confirmPassword" placeholder="Confirme a senha">
                    </div>
                    <div class="input-group">
                        <label>🏢 Nome do Studio</label>
                        <input type="text" id="studioName" placeholder="Ex: Studio Lash Designer">
                    </div>
                    <button id="btnCadastrar" class="btn-primary">✨ CRIAR CONTA E INICIAR TESTE ✨</button>
                    <div class="info-msg" style="margin-top: 1rem; background: rgba(37,99,235,0.1);">
                        ⚡ Após o cadastro, você terá <strong>7 dias de teste grátis</strong>!<br>
                        Após esse período, será necessário adquirir uma licença.
                    </div>
                </div>
            </div>
        `;
        document.getElementById("appRoot").innerHTML = html;

        document.getElementById("btnCadastrar").addEventListener("click", () => {
            const username = document.getElementById("newUsername").value.trim();
            const password = document.getElementById("newPassword").value;
            const confirm = document.getElementById("confirmPassword").value;
            const studioName = document.getElementById("studioName").value.trim();

            if(!username) {
                document.getElementById("cadastroError").innerText = "❌ Digite um nome de usuário!";
                document.getElementById("cadastroError").style.display = "block";
                return;
            }
            if(!password) {
                document.getElementById("cadastroError").innerText = "❌ Digite uma senha!";
                document.getElementById("cadastroError").style.display = "block";
                return;
            }
            if(password !== confirm) {
                document.getElementById("cadastroError").innerText = "❌ As senhas não coincidem!";
                document.getElementById("cadastroError").style.display = "block";
                return;
            }
            if(!studioName) {
                document.getElementById("cadastroError").innerText = "❌ Digite o nome do Studio!";
                document.getElementById("cadastroError").style.display = "block";
                return;
            }

            appData.usuario = { nome: username, senha: password };
            appData.empresa = { nome: studioName, criadoEm: new Date().toISOString() };
            appData.configuracoes.nomeStudio = studioName;
            appData.configuracoes.logo = "💎";

            ativarTesteGratis();

            const hoje = new Date().toISOString().slice(0,10);
            const amanha = new Date();
            amanha.setDate(amanha.getDate() + 1);
            appData.agendamentos = [
                { id: Date.now()+1, nome: "Fernanda Lima", telefone: "(11) 98765-4321", data: hoje, horario: "14:00", servico: "Volume Brasileiro", valor: 150.00, obs: "Primeira vez" },
                { id: Date.now()+2, nome: "Carolina Mendes", telefone: "(21) 99888-7766", data: amanha.toISOString().slice(0,10), horario: "10:30", servico: "Lash Lifting", valor: 120.00, obs: "Cílios sensíveis" }
            ];

            salvarDados();
            
            const msgDiv = document.createElement("div");
            msgDiv.className = "success-msg";
            msgDiv.innerHTML = `✅ Cadastro realizado! Teste grátis de 7 dias ativado!<br>Redirecionando para o login...`;
            document.querySelector(".auth-form").insertBefore(msgDiv, document.querySelector(".auth-form").firstChild);
            
            setTimeout(() => {
                showLogin();
            }, 2000);
        });
    }

    function showLogin() {
        const html = `
            <div class="auth-container">
                <div class="auth-header">
                    <h1>💎 Agenda <span>Lash Designer</span></h1>
                    <p>Área Restrita</p>
                </div>
                <div class="auth-form">
                    <div id="loginError" class="error-msg"></div>
                    <div class="input-group">
                        <label>👤 Usuário</label>
                        <input type="text" id="loginUsername" placeholder="Digite seu usuário">
                    </div>
                    <div class="input-group">
                        <label>🔒 Senha</label>
                        <input type="password" id="loginPassword" placeholder="Digite sua senha">
                    </div>
                    <button id="btnLogin" class="btn-primary">🔓 ENTRAR</button>
                </div>
            </div>
        `;
        document.getElementById("appRoot").innerHTML = html;

        document.getElementById("btnLogin").addEventListener("click", () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value;

            if(appData.usuario && username === appData.usuario.nome && password === appData.usuario.senha) {
                renderizarApp();
            } else {
                document.getElementById("loginError").innerText = "❌ Usuário ou senha incorretos!";
                document.getElementById("loginError").style.display = "block";
            }
        });
    }

    function showTelaAtivacao() {
        const html = `
            <div class="auth-container">
                <div class="auth-header">
                    <h1>💎 Agenda <span>Lash Designer</span></h1>
                    <p>Ativação de Licença</p>
                </div>
                <div class="auth-form">
                    <div class="warning-msg">
                        ⚠️ SEU PERÍODO DE TESTE DE 7 DIAS EXPIROU! ⚠️<br>
                        Adquira uma licença para continuar usando o sistema.
                    </div>
                    <div id="ativacaoError" class="error-msg"></div>
                    <div class="input-group">
                        <label>🔑 Chave de Ativação</label>
                        <input type="text" id="activationKey" placeholder="Cole sua chave de ativação aqui">
                    </div>
                    <button id="btnAtivar" class="btn-primary">🔓 ATIVAR LICENÇA</button>
                    <div class="info-msg" style="margin-top: 1rem;">
                        💡 Entre em contato com o administrador para adquirir sua licença.<br>
                        Após o pagamento, você receberá uma chave de ativação.
                    </div>
                </div>
            </div>
        `;
        document.getElementById("appRoot").innerHTML = html;

        document.getElementById("btnAtivar").addEventListener("click", () => {
            const chave = document.getElementById("activationKey").value.trim();
            
            if(!chave) {
                document.getElementById("ativacaoError").innerText = "❌ Digite a chave de ativação!";
                document.getElementById("ativacaoError").style.display = "block";
                return;
            }
            
            const resultado = ativarLicenca(chave);
            
            if(resultado.sucesso) {
                const msgDiv = document.createElement("div");
                msgDiv.className = "success-msg";
                msgDiv.innerHTML = `✅ ${resultado.descricao} ativado com sucesso!<br>Expira em: ${resultado.expiracao.toLocaleDateString()}<br>Redirecionando...`;
                document.querySelector(".auth-form").insertBefore(msgDiv, document.querySelector(".auth-form").firstChild);
                
                setTimeout(() => {
                    renderizarApp();
                }, 2000);
            } else {
                document.getElementById("ativacaoError").innerHTML = resultado.mensagem || "❌ Chave inválida! Verifique e tente novamente.";
                document.getElementById("ativacaoError").style.display = "block";
            }
        });
    }

    function renderizarApp() {
        const licencaValida = validarLicenca();
        const diasRestantes = getDiasRestantes();
        
        if(!licencaValida) {
            showTelaAtivacao();
            return;
        }
        
        const planoNome = appData.licenca ? PLANOS_INFO[appData.licenca.plano]?.nome || "Premium" : "Desconhecido";
        const isPlanoPago = appData.licenca?.plano !== "TESTE";
        
        const logoHtml = appData.configuracoes.logoBase64 
            ? `<img src="${appData.configuracoes.logoBase64}" alt="Logo">` 
            : `<span style="font-size:1.8rem;">${appData.configuracoes.logo || "💎"}</span>`;

        const html = `
            <div class="main-container" style="display:block;">
                <div class="hero">
                    <div class="logo-area">
                        <div class="logo-display">
                            <div class="logo-img">${logoHtml}</div>
                            <div>
                                <h1>${appData.empresa?.nome || "Agenda Lash Designer"}</h1>
                            </div>
                        </div>
                        <div class="company-badge">${planoNome}</div>
                    </div>
                </div>
                ${!isPlanoPago ? `<div class="warning-banner">⚠️ Teste grátis • Expira em ${diasRestantes} dias • Adquira uma licença</div>` : `
                <div class="warning-banner" style="background: rgba(16,185,129,0.1); color: #34d399;">✅ Licença ativa! Expira em ${diasRestantes} dias.</div>`}
                <div class="profile-bar">
                    <div class="profile-info">
                        <span>👤 ${appData.usuario?.nome || "Usuário"}</span>
                        <span>📅 ${diasRestantes} dias restantes</span>
                    </div>
                    <div>
                        <button id="btnConfigPerfil" class="btn-profile">⚙️ Perfil</button>
                        <button id="btnLogout" class="btn-logout">🚪 Sair</button>
                    </div>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="agenda">📅 Agendamentos</button>
                    <button class="tab-btn" data-tab="financeiro">💰 Financeiro</button>
                    <button class="tab-btn" data-tab="config">⚙️ Configurações</button>
                </div>

                <div id="tab-agenda" class="tab-content active">
                    <div class="dashboard">
                        <div class="form-section">
                            <h2>✍️ Novo Agendamento</h2>
                            <form id="formAgendamento">
                                <div class="form-group"><label>👤 Nome</label><input type="text" id="nome" required></div>
                                <div class="form-group"><label>📱 Telefone</label><input type="tel" id="telefone" required></div>
                                <div class="form-group"><label>📅 Data</label><input type="date" id="data" required></div>
                                <div class="form-group"><label>⏰ Horário</label>
                                    <select id="horario" required>
                                        <option>09:00</option><option>09:30</option><option>10:00</option><option>10:30</option>
                                        <option>11:00</option><option>11:30</option><option>12:00</option><option>13:00</option>
                                        <option>13:30</option><option>14:00</option><option>14:30</option><option>15:00</option>
                                        <option>15:30</option><option>16:00</option><option>16:30</option><option>17:00</option>
                                        <option>17:30</option><option>18:00</option>
                                    </select>
                                </div>
                                <div class="form-group"><label>💅 Serviço</label><input type="text" id="servico" required placeholder="Ex: Volume Brasileiro"></div>
                                <div class="form-group"><label>💰 Valor (R$)</label><input type="number" id="valor" step="0.01" value="${appData.valorServicoPadrao}"></div>
                                <div class="form-group"><label>📝 Obs</label><textarea id="obs"></textarea></div>
                                <button type="submit" class="btn-primary">💛 AGENDAR</button>
                            </form>
                        </div>
                        <div class="list-section">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                                <h2>📋 Agendamentos</h2>
                                <span class="badge-count" id="contador">${appData.agendamentos.length}</span>
                            </div>
                            <div class="filtro">
                                <input type="text" id="filtroNome" placeholder="🔍 Filtrar por nome ou serviço...">
                            </div>
                            <div id="listaCards"></div>
                        </div>
                    </div>
                </div>

                <div id="tab-financeiro" class="tab-content">
                    <div class="dashboard">
                        <div class="finance-section">
                            <h2>💰 Faturamento Mensal</h2>
                            <div class="total-faturamento">
                                <h3>R$ ${calcularFaturamentoMensal().toFixed(2)}</h3>
                                <p>Mês atual</p>
                            </div>
                            <div style="margin-top:1.5rem;">
                                <h3 style="color:var(--text-accent); font-size:1rem;">Valor Padrão</h3>
                                <input type="number" id="valorPadraoGlobal" step="0.01" value="${appData.valorServicoPadrao}">
                                <button id="btnAtualizarValorPadrao" class="btn-primary" style="margin-top:0.5rem;">Atualizar</button>
                            </div>
                        </div>
                        <div class="list-section">
                            <h2>📊 Serviços do Mês</h2>
                            <div id="listaFinanceiro"></div>
                        </div>
                    </div>
                </div>

                <div id="tab-config" class="tab-content">
                    <div class="dashboard">
                        <div class="form-section">
                            <h2>🏢 Empresa</h2>
                            <div class="form-group"><label>Nome do Studio</label><input type="text" id="configNomeStudio" value="${appData.empresa?.nome || ''}"></div>
                            <div class="form-group">
                                <label>Logomarca (JPEG/PNG)</label>
                                <input type="file" id="configLogoUpload" accept="image/jpeg,image/png">
                                <div class="preview-logo" id="previewLogo"></div>
                            </div>
                            <button id="btnSalvarConfig" class="btn-primary">Salvar Configurações</button>
                        </div>
                        <div class="form-section">
                            <h2>🔐 Segurança</h2>
                            <div class="form-group"><label>Nova Senha</label><input type="password" id="novaSenha" placeholder="Digite a nova senha"></div>
                            <div class="form-group"><label>Confirmar Senha</label><input type="password" id="confirmarSenha" placeholder="Confirme a nova senha"></div>
                            <button id="btnAlterarSenha" class="btn-primary">Alterar Senha</button>
                        </div>
                        <div class="form-section">
                            <h2>🔑 Licença</h2>
                            <div class="license-card">
                                <h4>${planoNome}</h4>
                                <p>Expira em: <strong>${new Date(appData.licenca?.expiracao).toLocaleDateString()}</strong></p>
                                <p>Dias restantes: <strong>${diasRestantes}</strong></p>
                                ${!isPlanoPago ? `
                                <div class="activate-section">
                                    <h4>🔓 Ativar Licença</h4>
                                    <div class="activate-input">
                                        <input type="text" id="chaveAtivacao" placeholder="Digite sua chave de ativação">
                                        <button id="btnAtivarLicenca" class="btn-primary">ATIVAR</button>
                                    </div>
                                    <small style="color:var(--text-secondary);">Adquira uma chave com o administrador</small>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
                <footer>💎 Agenda Lash Designer • Sistema Profissional de Agendamento</footer>
            </div>
        `;

        document.getElementById("appRoot").innerHTML = html;

        const previewDiv = document.getElementById("previewLogo");
        if(previewDiv && appData.configuracoes.logoBase64) {
            previewDiv.innerHTML = `<img src="${appData.configuracoes.logoBase64}" alt="Preview">`;
        }

        document.getElementById("btnAtivarLicenca")?.addEventListener("click", () => {
            const chave = document.getElementById("chaveAtivacao").value.trim();
            if(!chave) return alert("Digite a chave de ativação!");
            const resultado = ativarLicenca(chave);
            if(resultado.sucesso) {
                alert(`✅ ${resultado.descricao} ativado! Expira em: ${resultado.expiracao.toLocaleDateString()}`);
                renderizarApp();
            } else {
                alert(resultado.mensagem);
            }
        });

        document.getElementById("configLogoUpload")?.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if(file && (file.type === "image/jpeg" || file.type === "image/png")) {
                const base64 = await fileToBase64(file);
                appData.configuracoes.logoBase64 = base64;
                appData.configuracoes.logo = "📷";
                salvarDados();
                alert("Logomarca carregada!");
                renderizarApp();
            } else {
                alert("Selecione um arquivo JPEG ou PNG.");
            }
        });

        document.getElementById("btnSalvarConfig")?.addEventListener("click", () => {
            const novoNome = document.getElementById("configNomeStudio").value;
            if(novoNome) appData.empresa.nome = novoNome;
            salvarDados();
            alert("Configurações salvas!");
            renderizarApp();
        });

        document.getElementById("btnAlterarSenha")?.addEventListener("click", () => {
            const novaSenha = document.getElementById("novaSenha").value;
            const confirmar = document.getElementById("confirmarSenha").value;
            if(!novaSenha) return alert("Digite uma nova senha!");
            if(novaSenha !== confirmar) return alert("As senhas não coincidem!");
            alterarSenha(novaSenha);
            alert("Senha alterada com sucesso!");
            document.getElementById("novaSenha").value = "";
            document.getElementById("confirmarSenha").value = "";
        });

        document.getElementById("formAgendamento")?.addEventListener("submit", (e) => {
            e.preventDefault();
            const nome = document.getElementById("nome").value.trim();
            const telefone = document.getElementById("telefone").value.trim();
            const data = document.getElementById("data").value;
            const horario = document.getElementById("horario").value;
            const servico = document.getElementById("servico").value.trim();
            const valor = parseFloat(document.getElementById("valor").value) || appData.valorServicoPadrao;
            const obs = document.getElementById("obs").value.trim();
            if(!nome || !telefone || !data || !horario || !servico) return alert("Preencha todos os campos!");
            
            if(appData.agendamentos.some(ag => ag.data === data && ag.horario === horario)) {
                return alert("Horário já ocupado!");
            }
            
            appData.agendamentos.push({
                id: Date.now(), nome, telefone, data, horario, servico, valor, obs: obs || "Sem obs"
            });
            salvarDados();
            renderizarApp();
        });

        function renderizarListas() {
            const filtro = document.getElementById("filtroNome")?.value.toLowerCase() || "";
            let filtrados = appData.agendamentos.filter(ag => 
                ag.nome.toLowerCase().includes(filtro) || ag.servico.toLowerCase().includes(filtro));
            filtrados.sort((a,b) => a.data.localeCompare(b.data));
            
            const container = document.getElementById("listaCards");
            if(container) {
                if(filtrados.length === 0) container.innerHTML = "<div style='text-align:center;padding:2rem;color:var(--text-secondary);'>Nenhum agendamento</div>";
                else {
                    container.innerHTML = filtrados.map(ag => `
                        <div class="card">
                            <div class="card-header">
                                <div class="nome-cliente">💎 ${ag.nome}</div>
                                <div>📅 ${ag.data} • ⏰ ${ag.horario}</div>
                            </div>
                            <div>💅 ${ag.servico} • R$ ${(ag.valor || appData.valorServicoPadrao).toFixed(2)}</div>
                            <div class="observacao" style="color:var(--text-secondary); font-size:0.8rem;">📌 ${ag.obs}</div>
                            <button class="btn-remover" data-id="${ag.id}">❌ Cancelar</button>
                        </div>
                    `).join("");
                    document.querySelectorAll('.btn-remover').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = parseInt(btn.getAttribute('data-id'));
                            if(confirm("Cancelar este agendamento?")) {
                                appData.agendamentos = appData.agendamentos.filter(ag => ag.id !== id);
                                salvarDados();
                                renderizarApp();
                            }
                        });
                    });
                }
            }
            
            const containerFinanceiro = document.getElementById("listaFinanceiro");
            if(containerFinanceiro) {
                const mesAtual = new Date().getMonth();
                const faturamentoMes = appData.agendamentos.filter(ag => new Date(ag.data).getMonth() === mesAtual);
                if(faturamentoMes.length === 0) containerFinanceiro.innerHTML = "<div style='text-align:center;padding:1rem;color:var(--text-secondary);'>Nenhum serviço este mês</div>";
                else {
                    containerFinanceiro.innerHTML = faturamentoMes.map(ag => `
                        <div class="card">
                            <div><strong>${ag.nome}</strong> - ${ag.servico}</div>
                            <div>📅 ${ag.data} • 💰 R$ ${(ag.valor || appData.valorServicoPadrao).toFixed(2)}</div>
                        </div>
                    `).join("");
                }
            }
            
            const contador = document.getElementById("contador");
            if(contador) contador.innerText = appData.agendamentos.length;
        }

        document.getElementById("filtroNome")?.addEventListener("input", () => renderizarListas());
        document.getElementById("btnAtualizarValorPadrao")?.addEventListener("click", () => {
            const novoValor = parseFloat(document.getElementById("valorPadraoGlobal").value);
            if(!isNaN(novoValor) && novoValor > 0) {
                appData.valorServicoPadrao = novoValor;
                salvarDados();
                alert(`Valor padrão atualizado para R$ ${novoValor.toFixed(2)}`);
                renderizarApp();
            }
        });

        document.getElementById("btnConfigPerfil")?.addEventListener("click", () => {
            alert(`👤 Perfil\n\nUsuário: ${appData.usuario?.nome}\nStudio: ${appData.empresa?.nome}\nPlano: ${planoNome}\nExpira: ${new Date(appData.licenca?.expiracao).toLocaleDateString()}\nDias restantes: ${diasRestantes}`);
        });

        document.getElementById("btnLogout")?.addEventListener("click", () => {
            location.reload();
        });

        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const tab = btn.getAttribute("data-tab");
                document.querySelectorAll(".tab-content").forEach(tc => tc.classList.remove("active"));
                document.getElementById(`tab-${tab}`).classList.add("active");
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                if(tab === "financeiro" || tab === "agenda") renderizarListas();
            });
        });

        document.getElementById("data")?.setAttribute("min", new Date().toISOString().slice(0,10));
        renderizarListas();
    }

    function init() {
        carregarDados();
        if(!appData.usuario) {
            showCadastro();
        } else {
            if(!appData.licenca || !validarLicenca()) {
                showTelaAtivacao();
            } else {
                showLogin();
            }
        }
    }
